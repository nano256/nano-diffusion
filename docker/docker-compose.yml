name: nano-diffusion
services:
  workspace:
    image: ghcr.io/${REPO_NAME}:0.1.4
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888" 
      - "2222:22"
      - "5000:5000"
    volumes:
      - workspace:/workspace
      # Mount setup files so changes don't need a image rebuild
      - ./setup.sh:/setup.sh:ro  
      - ./config.sh:/config.sh:ro
      # - ../data:/workspace/repo/data
      # - ../models:/workspace/repo/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_NAME=${REPO_NAME}
      - JUPYTER_PASSWORD=${JUPYTER_PASSWORD}
      - SSH_USER_PASSWORD=${SSH_USER_PASSWORD}
      - SSH_ROOT_PASSWORD=${SSH_ROOT_PASSWORD}
      - MLFLOW_ENABLE_PROXY_FIX=true
    stdin_open: true
    tty: true
volumes:
  workspace: